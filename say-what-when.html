    <script>
      function hexToRgba(hex, alpha) {
        let cleanHex = hex.replace("#", "").trim();

        if (cleanHex.length === 3) {
          cleanHex = cleanHex
            .split("")
            .map((ch) => ch + ch)
            .join("");
        }

        const r = parseInt(cleanHex.substring(0, 2), 16);
        const g = parseInt(cleanHex.substring(2, 4), 16);
        const b = parseInt(cleanHex.substring(4, 6), 16);

        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function updateBackgroundFromPrevSlide(swiper) {
        const bg = document.querySelector(".bg-color");
        const prevSlide = document.querySelector(
          ".mySwiper .swiper-slide-prev .card",
        );

        if (!bg || !prevSlide) return;

        const cardColor = window.getComputedStyle(prevSlide).backgroundColor;

        function brightenColor(rgb, amount = 40) {
          const values = rgb.match(/\d+/g).map(Number);

          const r = Math.min(255, values[0] + amount);
          const g = Math.min(255, values[1] + amount);
          const b = Math.min(255, values[2] + amount);

          return `rgb(${r}, ${g}, ${b})`;
        }

        const brightColor = brightenColor(cardColor, 10);

        bg.style.background = `
      radial-gradient(
        circle at center,
        ${brightColor} 20%,
        ${brightColor} 100%
      )
    `;
      }

      const swiper = new Swiper(".mySwiper", {
        loop: true,
        speed: 700,
        centeredSlides: true,
        slidesPerView: "auto",
        spaceBetween: window.innerWidth * 0.03,
        allowTouchMove: true,

        navigation: {
          nextEl: ".next-btn",
          prevEl: ".prev-btn",
        },

        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },

        on: {
          init: function () {
            updateBackgroundFromPrevSlide(this);
          },

          slideChangeTransitionStart: function () {
            updateBackgroundFromPrevSlide(this);
          },

          resize: function () {
            this.params.spaceBetween = window.innerWidth * 0.03;
            this.update();
            updateBackgroundFromPrevSlide(this);
          },
        },
      });

      const swiperEl = document.querySelector(".mySwiper");
      const bodyEl = document.body;
      const nextBtn = document.querySelector(".next-btn");

      let isFocusMode = false;

      function enableFocusMode() {
        swiperEl.classList.add("focus-mode");
        bodyEl.classList.add("swiper-focus-active");
        isFocusMode = true;
      }

      function disableFocusMode() {
        swiperEl.classList.remove("focus-mode");
        bodyEl.classList.remove("swiper-focus-active");
        isFocusMode = false;
      }

      function toggleFocusMode() {
        if (isFocusMode) {
          disableFocusMode();
        } else {
          enableFocusMode();
        }
      }

      function getRealSlidesCount() {
        return document.querySelectorAll(
          ".mySwiper .swiper-slide:not(.swiper-slide-duplicate)",
        ).length;
      }

      function isLastRealSlideActive() {
        return swiper.realIndex === getRealSlidesCount() - 1;
      }

      swiper.on("click", function () {
        const clickedSlide = this.clickedSlide;
        if (!clickedSlide) return;

        if (clickedSlide.classList.contains("swiper-slide-active")) {
          toggleFocusMode();
        } else if (isFocusMode) {
          const clickedIndex = clickedSlide.getAttribute(
            "data-swiper-slide-index",
          );
          this.slideToLoop(clickedIndex);
        }
      });

      swiper.on("slideChangeTransitionEnd", function () {
        if (isFocusMode) {
          swiperEl.classList.add("focus-mode");
          bodyEl.classList.add("swiper-focus-active");
        }
      });

      if (nextBtn) {
        nextBtn.addEventListener(
          "click",
          function (e) {
            if (isFocusMode && isLastRealSlideActive()) {
              e.preventDefault();
              e.stopPropagation();
              e.stopImmediatePropagation();
              window.location.href = "pranam.html";
            }
          },
          true,
        );
      }
